spring.application.name=Optiplant

# Datasource (uses environment variables with sensible defaults)
spring.datasource.url=jdbc:postgresql://localhost:5432/optiplant
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Notes:
# - By default this config expects a local Postgres instance (or docker compose)
# - For quick local development you can set spring.jpa.hibernate.ddl-auto=update
#   but for production use migrations (Flyway/Liquibase) and keep ddl-auto=none

    