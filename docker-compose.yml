services:
  optiplant-db:
    image: postgres:18
    container_name: optiplant-db
    environment:
      POSTGRES_DB: optiplant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./Database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optiplant"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  optiplant-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: optiplant-api:latest
    container_name: optiplant-api
    depends_on:
      optiplant-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://optiplant-db:5432/optiplant
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: change-this-secret-to-a-long-random-value-with-at-least-32-characters
      JWT_EXPIRATION_MS: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    restart: unless-stopped
